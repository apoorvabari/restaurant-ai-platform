# ==========================================
# PROJECT DETAILS
# ==========================================
spring.application.name=restaurant

# ==========================================
# DATABASE CONFIGURATION (MySQL)
# ==========================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_db1?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:10203040}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / HIBERNATE SETTINGS
# ==========================================
# 'update' lets Hibernate ALTER the schema to add new columns (e.g. keycloak_id, username)
# without dropping existing data. Switch to 'validate' + Flyway for production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# ADDED: Explicitly define MySQL dialect to prevent startup warnings
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# FLYWAY SETTINGS
# ==========================================
# Flyway disabled — no migration scripts exist yet.
# Re-enable when you add scripts under src/main/resources/db/migration/
spring.flyway.enabled=false

# ==========================================
# SERVER PORT
# ==========================================
server.port=8080

# ==========================================
# KEYCLOAK OAUTH2 RESOURCE SERVER (JWT Validation)
# ==========================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/restaurant-realm
# REMOVED: jwk-set-uri is automatically discovered from the issuer-uri. No need to hardcode it.

# ==========================================
# KEYCLOAK ADMIN CLIENT (For backend API calls to Keycloak)
# ==========================================
# FIX: Changed from 'restaurant-frontend' to a dedicated backend client.
# You MUST create a 'confidential' client named 'restaurant-backend' in Keycloak Admin Console.
keycloak.auth-server-url=http://localhost:8180
keycloak.realm=restaurant-realm
keycloak.resource=restaurant-backend 
keycloak.credentials.secret=${KEYCLOAK_BACKEND_SECRET:your_backend_client_secret_here}

# ==========================================
# CORS CONFIGURATION (Custom Properties)
# ==========================================
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5176}
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS,PATCH
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# ==========================================
# AI CHATBOT CONFIGURATION
# ==========================================
# FIX: Spring AI requires specific prefixes. 
# If using OpenAI:
spring.ai.openai.api-key=${OPENAI_API_KEY:sk-placeholder}
spring.ai.openai.chat.options.model=gpt-4o-mini
# OR If using Qwen/Tongyi (Uncomment these and comment out OpenAI):
# spring.ai.tongyi.api-key=${DASHSCOPE_API_KEY:sk-placeholder}
# spring.ai.tongyi.chat.options.model=qwen-plus

# ==========================================
# LOGGING LEVELS
# ==========================================
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.apoorva.restaurant=DEBUG