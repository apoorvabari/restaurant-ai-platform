# Project Details
spring.application.name=restaurant
spring.profiles.active=local

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/restaurant_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:10203040}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway settings to support an existing MySQL schema without history table
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=false

# Server Port (backend)
server.port=8080

# OAuth2 Resource Server – Keycloak integration (DISABLED - using custom JWT)
# spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/restaurant-realm
# spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8180/realms/restaurant-realm/protocol/openid-connect/certs

# JWT secret for any custom signing (not used by resource server)
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production-min-256-bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY}

# Logging Levels
logging.level.org.hibernate.SQL=DEBUG