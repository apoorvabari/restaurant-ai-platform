services:
  - type: web
    name: restaurant-backend
    env: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/restaurant-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DB_URL
        fromDatabase:
          name: restaurant-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: restaurant-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: restaurant-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000
      - key: OPENAI_API_KEY
        generateValue: true

databases:
  - name: restaurant-db
    databaseName: restaurant_db
    user: restaurant_user
